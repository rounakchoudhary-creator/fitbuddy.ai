<!DOCTYPE html>
<html>
<head>
<title>FitBuddy AI</title>
</head>

<body>

<h1>FitBuddy AI Workout Generator</h1>

<form id="form">

<input type="text" id="name" placeholder="Name"><br><br>

<input type="number" id="age" placeholder="Age"><br><br>

<input type="number" id="weight" placeholder="Weight"><br><br>

<select id="goal">
<option value="weight loss">Weight Loss</option>
<option value="muscle gain">Muscle Gain</option>
<option value="general wellness">General Wellness</option>
</select><br><br>

<select id="intensity">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select><br><br>

<button type="submit">Generate Plan</button>

</form>

<pre id="result"></pre>

<script>

document.getElementById("form").onsubmit = async function(e){

e.preventDefault()

let data = {
name: document.getElementById("name").value,
age: parseInt(document.getElementById("age").value),
weight: parseInt(document.getElementById("weight").value),
goal: document.getElementById("goal").value,
intensity: document.getElementById("intensity").value
}

let response = await fetch("/generate-plan",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
})

let result = await response.json()

document.getElementById("result").innerText =
result.workout_plan + "\n\nTIP:\n" + result.nutrition_tip

}

</script>

</body>
</html>
